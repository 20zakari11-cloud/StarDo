workflows:
  android-debug-build:
    name: Android Debug Build
    max_build_duration: 60
    environment:
      java: 17
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
    scripts:
      - name: Set Gradle wrapper permissions
        script: |
          chmod +x gradlew
      - name: Clean project
        script: |
          ./gradlew clean
      - name: Build debug APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
