workflows:
  stardo-bootstrap:
    name: StarDo Bootstrap Build

    environment:
      java: 17

    scripts:
      - name: Check environment
        script: |
          java -version
          gradle -v || echo "Gradle not found (normal at start)"

      - name: Initialize Gradle wrapper (safe attempt)
        script: |
          if [ ! -f "./gradlew" ]; then
            echo "No wrapper found - trying to generate via gradle init"
            gradle init --type basic || true
          fi

      - name: Make gradlew executable if exists
        script: |
          chmod +x gradlew || true

      - name: Build project (fallback safe mode)
        script: |
          if [ -f "./gradlew" ]; then
            ./gradlew assembleDebug
          else
            gradle assembleDebug || true
          fi

    artifacts:
      - app/build/outputs/**/*.apk
